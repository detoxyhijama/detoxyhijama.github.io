<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-src 'self' https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me;"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Wishlist | Detoxy Hijama</title>
  <meta name="description" content="View your saved hijama products wishlist."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/assets/style.css"/>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png"/>
</head>
<body>
<script src="/assets/js/monitor.js"></script>


<div id="header-mount" data-page="Wishlist"></div>
<main>
  <section class="section-sm">
    <div class="container">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="/index.html">Home</a>
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        <span aria-current="page">My Wishlist</span>
      </nav>
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:28px">
        <h1 style="font-family:var(--font-serif);font-size:1.8rem;font-weight:700;color:var(--dark)">My Wishlist <span id="wlCountLabel" style="font-size:1rem;font-weight:400;color:var(--muted)"></span></h1>
        <button onclick="clearWishlist()" id="clearWlBtn" style="display:none" class="btn btn-outline btn-sm">Clear Wishlist</button>
      </div>
      <div id="wishlistGrid" class="wl-grid"></div>
      <div id="wishlistEmpty" class="wl-empty" style="display:none">
        <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2"><path stroke-linecap="round" stroke-linejoin="round" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"/></svg>
        <h3 style="font-weight:700;color:var(--dark);margin-bottom:8px">Your wishlist is empty</h3>
        <p style="font-size:.88rem;margin-bottom:20px">Browse our products and save your favourites here.</p>
        <a href="/products.html" class="btn btn-primary">Browse Products</a>
      </div>
    </div>
  </section>
</main>
<div id="footer-mount"></div>
<script src="/assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  document.getElementById('header-mount').innerHTML = renderHeader('Wishlist');
  document.getElementById('footer-mount').innerHTML = renderFooter();
  initSearch(); initMobileNav(); Cart.updateUI(); Wishlist.updateUI(); updateNavAuthLink();
  initScrollTop(); initAnimateOnScroll();
  renderWishlist();
  // Re-render when DB products load (prices/stock may differ from hardcoded)
  document.addEventListener('productsUpdated', renderWishlist);
});
function renderWishlist() {
  const ids = Wishlist.get();
  const grid = document.getElementById('wishlistGrid');
  const empty = document.getElementById('wishlistEmpty');
  const lbl = document.getElementById('wlCountLabel');
  const clearBtn = document.getElementById('clearWlBtn');
  if (!ids.length) {
    grid.style.display = 'none'; empty.style.display = 'block';
    lbl.textContent = ''; clearBtn.style.display = 'none'; return;
  }
  grid.style.display = ''; empty.style.display = 'none';
  lbl.textContent = '(' + ids.length + ' item' + (ids.length !== 1 ? 's' : '') + ')';
  clearBtn.style.display = 'inline-flex';
  const products = ids.map(id => PRODUCTS.find(p => p.id === id)).filter(Boolean);
  grid.innerHTML = products.map((p, i) => renderProductCard(p, i)).join('');
  if (typeof initAnimateOnScroll === 'function') initAnimateOnScroll();
}
function clearWishlist() {
  if (!confirm('Remove all items from your wishlist?')) return;
  Wishlist.save([]); renderWishlist(); showToast('Wishlist cleared', 'default');
}
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js',{scope:'/',updateViaCache:'none'})
      .then(function(reg){
        // Check for updates every 60s (catches new deployments)
        // Smart SW update: check every 5min + on visibility change
        setInterval(function(){ reg.update().catch(function(){}); }, 300000);
        document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='active') reg.update().catch(function(){}); });
      }).catch(function(){});
  });
}
</script>
</body>
</html>
