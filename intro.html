<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased}
#cv{position:fixed;inset:0;z-index:0}
#ui{position:fixed;inset:0;z-index:5;pointer-events:none}

/* ── Step base: all hidden ── */
.S{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;opacity:0;transition:opacity .7s cubic-bezier(.4,0,.2,1);pointer-events:none}
.S.on{opacity:1}.S.click{pointer-events:auto}

/* ── STEP 1: PRELOAD ── */
#s1{gap:32px}
.brand-row{display:flex;align-items:center;gap:16px;opacity:0;animation:slideUp .9s .3s cubic-bezier(.16,1,.3,1) forwards}
.brand-logo{width:52px;height:52px;border-radius:14px;border:1px solid rgba(87,162,160,.3);background:rgba(87,162,160,.06);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(20px)}
.brand-logo img{width:38px;height:38px;border-radius:8px}
.brand-text{display:flex;flex-direction:column;gap:3px}
.brand-name{font-family:'Cormorant Garamond',serif;font-size:1.5rem;font-weight:700;color:#fff;letter-spacing:.04em;line-height:1}
.brand-tag{font-size:.58rem;font-weight:500;color:#57A2A0;letter-spacing:.18em;text-transform:uppercase}
.load-label{font-size:.6rem;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35);opacity:0;animation:slideUp .6s .7s forwards}
.load-bar{width:160px;height:1px;background:rgba(255,255,255,.08);position:relative;opacity:0;animation:slideUp .5s .9s forwards}
.load-fill{position:absolute;left:0;top:0;height:100%;width:0;background:linear-gradient(90deg,rgba(87,162,160,.4),#57A2A0);transition:width .05s linear;box-shadow:0 0 8px rgba(87,162,160,.5)}
.load-pct{font-size:.62rem;font-weight:400;color:rgba(87,162,160,.7);letter-spacing:.1em;opacity:0;animation:slideUp .5s 1s forwards}

/* ── STEP 2: LOGO REVEAL ── */
#s2{gap:20px}
.reveal-rule{width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(87,162,160,.6),transparent);transition:width 1s cubic-bezier(.4,0,.2,1)}
.reveal-name{font-family:'Cormorant Garamond',serif;font-size:clamp(3rem,7vw,5.5rem);font-weight:300;letter-spacing:.12em;color:#fff;text-align:center;line-height:1;opacity:0;transform:translateY(24px);transition:opacity .9s ease,transform .9s cubic-bezier(.16,1,.3,1)}
.reveal-sub{font-size:.62rem;font-weight:400;letter-spacing:.38em;text-transform:uppercase;color:rgba(87,162,160,.7);opacity:0;transform:translateY(12px);transition:opacity .7s ease,transform .7s ease}

/* ── STEP 3: CUP SCENE ── */
#s3{gap:0}
.cup-super{font-size:.58rem;font-weight:500;letter-spacing:.3em;text-transform:uppercase;color:rgba(87,162,160,.6);margin-bottom:18px;opacity:0;transform:translateY(-14px);transition:opacity .6s ease,transform .6s ease}
.cup-headline{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;color:#fff;letter-spacing:.04em;text-align:center;line-height:1.2;opacity:0;transform:translateY(18px);transition:opacity .7s ease,transform .7s cubic-bezier(.16,1,.3,1)}
.cup-headline em{color:#57A2A0;font-style:normal;font-weight:400}
#clickZone{position:absolute;cursor:pointer;z-index:6;pointer-events:auto}
.cup-cta{display:flex;align-items:center;gap:16px;margin-top:52px;opacity:0;transform:translateY(10px);transition:opacity .6s ease,transform .6s ease}
.cta-line{width:40px;height:1px;background:rgba(255,255,255,.15)}
.cta-text{font-size:.58rem;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,255,255,.35)}
.cta-dot{width:6px;height:6px;border-radius:50%;background:#57A2A0;box-shadow:0 0 8px rgba(87,162,160,.8);animation:dotPulse 2s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.3)}}

/* ── STEP 4: ACTIVATION ── */
#s4{gap:28px}
.act-num{font-family:'Cormorant Garamond',serif;font-size:clamp(8rem,18vw,14rem);font-weight:300;line-height:1;color:rgba(255,255,255,.04);letter-spacing:-.03em;position:absolute;user-select:none;transition:color .5s}
.act-status{font-size:.6rem;font-weight:400;letter-spacing:.28em;text-transform:uppercase;color:rgba(87,162,160,.65);opacity:0;transition:opacity .4s}
.act-bar-wrap{width:220px;height:1px;background:rgba(255,255,255,.06);overflow:hidden;opacity:0;transition:opacity .4s}
.act-bar{height:100%;width:0;background:linear-gradient(90deg,rgba(87,162,160,.4),#57A2A0 60%,#80c5c4);box-shadow:0 0 6px rgba(87,162,160,.4);transition:width .04s linear}
.act-sub{font-size:.54rem;font-weight:300;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.18);opacity:0;transition:opacity .4s}

/* ── SKIP ── */
#skip{position:fixed;bottom:28px;right:28px;z-index:20;font-family:'Outfit',sans-serif;font-size:.58rem;font-weight:400;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.25);background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:4px;padding:8px 18px;cursor:pointer;opacity:0;pointer-events:none;transition:color .2s,border-color .2s,opacity .4s;backdrop-filter:blur(12px)}
#skip.on{opacity:1;pointer-events:auto}
#skip:hover{color:rgba(255,255,255,.65);border-color:rgba(87,162,160,.35)}

/* ── RIPPLES ── */
.rpl{position:fixed;border-radius:50%;pointer-events:none;z-index:4;border:1px solid rgba(87,162,160,.4);transform:translate(-50%,-50%) scale(0);animation:rplOut var(--d,1200ms) cubic-bezier(.05,.55,.2,1) forwards}
@keyframes rplOut{to{transform:translate(-50%,-50%) scale(1);opacity:0}}

/* ── SCANLINE ── */
#scan{position:fixed;inset:0;z-index:3;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);opacity:.4}

@keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
</style>

<script>
'use strict';
/* =====================================================
   PS5-LEVEL CINEMATIC INTRO — Detoxy Hijama
   Full-canvas WebGL-style rendering via Canvas 2D
   Photorealistic cup: clear acrylic dome, orange valve,
   blue valve mechanism, wide medical-grade rim
   Brand: #57A2A0 / #1a3938 / #000 PS5-dark BG
===================================================== */
var SEEN = 'dh_ps5_v1';
var W = innerWidth, H = innerHeight;
var cv = document.getElementById('cv');
var cx = cv.getContext('2d');
cv.width = W; cv.height = H;
window.addEventListener('resize', function(){
  W = cv.width  = innerWidth;
  H = cv.height = innerHeight;
  if(CUP.w) { initCup(); placeZone(); }
});

var T = [87,162,160], TD=[53,110,108], DK=[26,57,56];
function rgb(c,a){ return 'rgba('+c[0]+','+c[1]+','+c[2]+','+(a==null?1:a)+')'; }

/* ─── CUP ─────────────────────────────────────────── */
var CUP = {x:0,y:0,w:0,h:0,py:0,pt:0,ga:0,gt:0};
function initCup(){
  var s = Math.min(W,H) * (W<600?.48:.32);
  CUP.w=s*.7; CUP.h=s; CUP.x=W/2; CUP.y=H/2+s*.03;
}
function placeZone(){
  var z=document.getElementById('clickZone');
  var rr=CUP.w*.56, hh=CUP.h*.88;
  z.style.cssText='position:fixed;left:'+(CUP.x-rr)+'px;top:'+(CUP.y-CUP.h*.5)+'px;width:'+(rr*2)+'px;height:'+hh+'px;border-radius:50% 50% 40% 40%;cursor:pointer;pointer-events:auto;z-index:6';
}

function drawCup(){
  var s=CUP.w, h=CUP.h, ox=CUP.x, oy=CUP.y+CUP.py;
  cx.save(); cx.translate(ox,oy);

  /* outer glow */
  if(CUP.ga>0){
    var og=cx.createRadialGradient(0,0,h*.05,0,0,h*.65);
    og.addColorStop(0,rgb(T,CUP.ga*.18)); og.addColorStop(1,rgb(T,0));
    cx.fillStyle=og; cx.beginPath(); cx.ellipse(0,0,h*.65,h*.65,0,0,Math.PI*2); cx.fill();
  }

  /* ground shadow */
  var sg=cx.createRadialGradient(0,h*.49+8,0,0,h*.49+8,s*.58);
  sg.addColorStop(0,'rgba(0,0,0,.55)'); sg.addColorStop(.5,'rgba(0,0,0,.18)'); sg.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=sg; cx.beginPath(); cx.ellipse(0,h*.49+12,s*.6,s*.12,0,0,Math.PI*2); cx.fill();

  var dT=-h*.47, dM=h*.02, dB=h*.42;

  /* ── dome path ── */
  function domePath(sc){
    cx.beginPath();
    cx.moveTo(0,dT*sc);
    cx.bezierCurveTo(s*.18*sc,dT*sc, s*.47*sc,dT+h*.22*sc, s*.45*sc,dM*sc);
    cx.bezierCurveTo(s*.47*sc,dM+h*.22*sc, s*.42*sc,dB*sc, s*.40*sc,dB*sc);
    cx.lineTo(-s*.40*sc,dB*sc);
    cx.bezierCurveTo(-s*.42*sc,dB*sc, -s*.47*sc,dM+h*.22*sc, -s*.45*sc,dM*sc);
    cx.bezierCurveTo(-s*.47*sc,dT+h*.22*sc, -s*.18*sc,dT*sc, 0,dT*sc);
    cx.closePath();
  }

  /* dome fill */
  domePath(1);
  var df=cx.createLinearGradient(-s*.5,dT,s*.5,dB);
  df.addColorStop(0,  'rgba(180,230,230,.12)');
  df.addColorStop(.18,'rgba(210,240,240,.08)');
  df.addColorStop(.5, 'rgba(150,210,210,.06)');
  df.addColorStop(.85,'rgba(180,228,228,.09)');
  df.addColorStop(1,  'rgba(200,235,235,.10)');
  cx.fillStyle=df; cx.fill();

  /* dome border — thin bright edge */
  domePath(1);
  cx.strokeStyle='rgba(87,162,160,.28)'; cx.lineWidth=1.2; cx.stroke();

  /* inner wall */
  domePath(.88);
  cx.strokeStyle='rgba(87,162,160,.08)'; cx.lineWidth=.7; cx.stroke();

  /* inner depth */
  cx.save(); domePath(.87); cx.clip();
  var ig=cx.createRadialGradient(0,0,h*.04,0,0,h*.43);
  ig.addColorStop(0,'rgba(200,240,240,.16)'); ig.addColorStop(.6,'rgba(150,215,215,.05)'); ig.addColorStop(1,'rgba(100,185,185,.02)');
  cx.fillStyle=ig; cx.fillRect(-s,dT,s*2,h); cx.restore();

  /* ── PS5-style: fresnel rim glow ── */
  var fresnelL=cx.createLinearGradient(-s*.48,0,-s*.22,0);
  fresnelL.addColorStop(0,'rgba(87,162,160,.55)');
  fresnelL.addColorStop(.4,'rgba(87,162,160,.22)');
  fresnelL.addColorStop(1,'rgba(87,162,160,0)');
  cx.beginPath(); cx.moveTo(-s*.46,dT+h*.1); cx.bezierCurveTo(-s*.47,dT+h*.26,-s*.47,dT+h*.46,-s*.43,dB-h*.08);
  cx.strokeStyle=fresnelL; cx.lineWidth=s*.032; cx.lineCap='round'; cx.stroke();

  var fresnelR=cx.createLinearGradient(s*.22,0,s*.48,0);
  fresnelR.addColorStop(0,'rgba(87,162,160,0)');
  fresnelR.addColorStop(.6,'rgba(87,162,160,.18)');
  fresnelR.addColorStop(1,'rgba(87,162,160,.40)');
  cx.beginPath(); cx.moveTo(s*.41,dT+h*.14); cx.bezierCurveTo(s*.44,dM,s*.44,dM+h*.2,s*.40,dB-h*.1);
  cx.strokeStyle=fresnelR; cx.lineWidth=s*.018; cx.stroke();

  /* top specular bright spot */
  cx.beginPath(); cx.moveTo(-s*.08,dT+h*.04); cx.bezierCurveTo(-s*.04,dT,s*.04,dT,s*.08,dT+h*.04);
  var ts=cx.createLinearGradient(-s*.08,dT,s*.08,dT);
  ts.addColorStop(0,'rgba(255,255,255,0)'); ts.addColorStop(.5,'rgba(255,255,255,.75)'); ts.addColorStop(1,'rgba(255,255,255,0)');
  cx.strokeStyle=ts; cx.lineWidth=s*.038; cx.stroke();

  /* left highlight */
  cx.beginPath(); cx.moveTo(-s*.30,dT+h*.10); cx.bezierCurveTo(-s*.37,dT+h*.25,-s*.39,dT+h*.43,-s*.33,dM+h*.15);
  var lh=cx.createLinearGradient(-s*.38,dT,-s*.26,dM);
  lh.addColorStop(0,'rgba(255,255,255,.50)'); lh.addColorStop(.5,'rgba(255,255,255,.30)'); lh.addColorStop(1,'rgba(255,255,255,0)');
  cx.strokeStyle=lh; cx.lineWidth=s*.050; cx.stroke();

  /* ── wide flat rim ── */
  var rT=dB, rB=dB+h*.088, rO=s*.52, rI=s*.38;
  /* rim face */
  cx.beginPath(); cx.ellipse(0,rT,rO,h*.026,0,0,Math.PI*2);
  var rtg=cx.createLinearGradient(0,rT-h*.016,0,rT+h*.016);
  rtg.addColorStop(0,'rgba(180,230,230,.22)'); rtg.addColorStop(.5,'rgba(87,162,160,.08)'); rtg.addColorStop(1,'rgba(180,228,228,.18)');
  cx.fillStyle=rtg; cx.fill(); cx.strokeStyle='rgba(87,162,160,.35)'; cx.lineWidth=.8; cx.stroke();
  /* rim wall */
  cx.beginPath(); cx.moveTo(-rO,rT); cx.lineTo(-rO,rB);
  cx.bezierCurveTo(-rO,rB+h*.012,-rI*.88,rB+h*.016,0,rB+h*.016);
  cx.bezierCurveTo(rI*.88,rB+h*.016,rO,rB+h*.012,rO,rB); cx.lineTo(rO,rT);
  var rwg=cx.createLinearGradient(-rO,rT,rO,rB);
  rwg.addColorStop(0,'rgba(180,228,228,.22)'); rwg.addColorStop(.3,'rgba(87,162,160,.09)');
  rwg.addColorStop(.7,'rgba(165,220,220,.18)'); rwg.addColorStop(1,'rgba(185,232,232,.20)');
  cx.fillStyle=rwg; cx.fill(); cx.strokeStyle='rgba(87,162,160,.28)'; cx.lineWidth=.8; cx.stroke();
  /* rim highlight strip */
  cx.beginPath(); cx.ellipse(0,rT,rO*.93,h*.017,0,Math.PI,Math.PI*2);
  var rhs=cx.createLinearGradient(-rO,rT,rO,rT);
  rhs.addColorStop(0,'rgba(255,255,255,0)'); rhs.addColorStop(.28,'rgba(255,255,255,.55)');
  rhs.addColorStop(.72,'rgba(255,255,255,.55)'); rhs.addColorStop(1,'rgba(255,255,255,0)');
  cx.strokeStyle=rhs; cx.lineWidth=h*.012; cx.stroke();

  /* ── valve cage (metal) ── */
  var cW=s*.09, cY=dT+h*.022, cH=h*.11;
  cx.lineCap='round';
  cx.beginPath();
  cx.moveTo(-cW*.38,cY); cx.lineTo(-cW*.38,cY+cH*.72);
  cx.moveTo( cW*.38,cY); cx.lineTo( cW*.38,cY+cH*.72);
  cx.strokeStyle='rgba(200,215,215,.65)'; cx.lineWidth=s*.013; cx.stroke();
  cx.beginPath(); cx.moveTo(-cW*.38,cY); cx.lineTo(cW*.38,cY);
  cx.strokeStyle='rgba(210,225,225,.75)'; cx.lineWidth=s*.016; cx.stroke();

  /* ── blue valve sphere ── */
  var bY=cY+cH*.56, bR=s*.074;
  var bvg=cx.createRadialGradient(-bR*.28,bY-bR*.28,0,0,bY,bR);
  bvg.addColorStop(0,'rgba(140,190,230,.95)'); bvg.addColorStop(.5,'rgba(75,140,185,.92)'); bvg.addColorStop(1,'rgba(35,95,150,.88)');
  cx.beginPath(); cx.arc(0,bY,bR,0,Math.PI*2); cx.fillStyle=bvg; cx.fill();
  cx.strokeStyle='rgba(30,88,140,.6)'; cx.lineWidth=s*.009; cx.stroke();
  cx.beginPath(); cx.arc(-bR*.26,bY-bR*.26,bR*.3,0,Math.PI*2);
  cx.fillStyle='rgba(210,240,255,.52)'; cx.fill();
  cx.beginPath(); cx.ellipse(0,bY+bR*.65,bR*.72,bR*.19,0,0,Math.PI*2);
  cx.fillStyle='rgba(22,70,110,.5)'; cx.fill();

  /* ── orange valve stem ── */
  var stX=s*.03, stB=bY-bR*.28, stT=cY-h*.062, stW=s*.030, stR=stW*.5;
  cx.beginPath(); cx.roundRect(-stW*.5+stX,stT,stW,stB-stT,stR);
  var svg2=cx.createLinearGradient(-stW*.5+stX,0,stW*.5+stX,0);
  svg2.addColorStop(0,'rgba(255,168,44,.96)'); svg2.addColorStop(.38,'rgba(255,192,74,.92)');
  svg2.addColorStop(.72,'rgba(210,118,20,.90)'); svg2.addColorStop(1,'rgba(182,88,10,.86)');
  cx.fillStyle=svg2; cx.fill(); cx.strokeStyle='rgba(152,78,10,.48)'; cx.lineWidth=.8; cx.stroke();
  /* knob */
  var kR=stW*.88, kY=stT;
  var kng=cx.createRadialGradient(stX-kR*.22,kY-kR*.22,0,stX,kY,kR);
  kng.addColorStop(0,'rgba(255,218,108,.96)'); kng.addColorStop(.5,'rgba(255,164,38,.92)'); kng.addColorStop(1,'rgba(188,94,10,.86)');
  cx.beginPath(); cx.arc(stX,kY,kR,0,Math.PI*2); cx.fillStyle=kng; cx.fill();
  cx.strokeStyle='rgba(145,70,10,.44)'; cx.lineWidth=.8; cx.stroke();
  cx.beginPath(); cx.arc(stX-kR*.24,kY-kR*.24,kR*.28,0,Math.PI*2);
  cx.fillStyle='rgba(255,248,188,.70)'; cx.fill();

  cx.restore();
}

/* ─── PARTICLE ENGINE ─────────────────────────────── */
var PARTS=[], TRACE=[], TOXIN=[], RIPS=[];
var traceT=0, traceBuilt=false;

function mkAmb(){
  PARTS=[];
  var n=W<600?60:140;
  for(var i=0;i<n;i++){
    PARTS.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-.5)*.4, vy:(Math.random()-.5)*.4,
      r:Math.random()*1.6+.3, a:Math.random()*.18+.03,
      c:Math.random()>.45?T:TD,
      flicker:Math.random()*Math.PI*2
    });
  }
}

function buildTrace(){
  if(traceBuilt)return; traceBuilt=true;
  var cx2=W/2,cy2=H/2,R=Math.min(W,H)*.145;
  for(var i=0;i<260;i++){
    var t=i/260, fy=-1+t*2;
    var fw=fy<-.7?(.12+(fy+1)/.3*.10):fy<-.2?(.22+(fy+.7)/.5*.56):fy<.5?(.78-(fy+.2)/.7*.10):(.68-(fy-.5)/.5*.28);
    fw=Math.max(.10,Math.min(.82,fw));
    var side=Math.random()>.5?1:-1;
    TRACE.push({x:cx2+side*fw*R+(Math.random()-.5)*R*.05,y:cy2+fy*R*1.26+(Math.random()-.5)*R*.05,c:Math.random()>.38?T:TD,r:Math.random()*1.8+.5});
  }
  for(var j=0;j<60;j++){var ang=j/60*Math.PI*2;TRACE.push({x:cx2+Math.cos(ang)*R*.82+(Math.random()-.5)*3,y:cy2+R*1.06+Math.sin(ang)*R*.09+(Math.random()-.5)*3,c:T,r:Math.random()*1.4+.5});}
  for(var k=TRACE.length-1;k>0;k--){var si=Math.floor(Math.random()*(k+1)),tmp=TRACE[k];TRACE[k]=TRACE[si];TRACE[si]=tmp;}
}

function spawnTox(ox,oy){
  var n=W<600?100:260;
  for(var i=0;i<n;i++){
    var a=Math.random()*Math.PI*2,d=Math.random()*CUP.w*.38;
    TOXIN.push({x:ox+Math.cos(a)*d,y:oy+CUP.h*.24+Math.random()*CUP.h*.08,vx:(Math.random()-.5)*1.6,vy:-(Math.random()*3.2+.9),r:Math.random()*2.8+.8,a:0,ma:Math.random()*.72+.25,life:0,del:Math.floor(Math.random()*90),clean:false,c:[8,35,30]});
  }
}

/* ─── BACKGROUND ──────────────────────────────────── */
/* PS5-style: deep near-black, subtle blue-teal horizon glow */
function drawBG(){
  /* base deep black */
  cx.fillStyle='#000508';
  cx.fillRect(0,0,W,H);

  /* subtle horizon glow — teal deep below centre */
  var hz=cx.createRadialGradient(W/2,H*.68,0,W/2,H*.68,H*.62);
  hz.addColorStop(0,'rgba(87,162,160,.055)');
  hz.addColorStop(.5,'rgba(53,110,108,.022)');
  hz.addColorStop(1,'rgba(26,57,56,0)');
  cx.fillStyle=hz; cx.fillRect(0,0,W,H);

  /* top-left cold blue ambient */
  var tl=cx.createRadialGradient(W*.12,H*.08,0,W*.12,H*.08,H*.55);
  tl.addColorStop(0,'rgba(87,162,160,.03)');
  tl.addColorStop(1,'rgba(87,162,160,0)');
  cx.fillStyle=tl; cx.fillRect(0,0,W,H);

  /* vignette */
  var vg=cx.createRadialGradient(W/2,H/2,H*.28,W/2,H/2,H*.9);
  vg.addColorStop(0,'rgba(0,0,0,0)');
  vg.addColorStop(1,'rgba(0,0,0,.78)');
  cx.fillStyle=vg; cx.fillRect(0,0,W,H);
}

/* ─── RENDER LOOP ─────────────────────────────────── */
var RAF, frame=0, phaseNow='pre', floatT=0;

function render(){
  RAF=requestAnimationFrame(render);
  frame++;
  cx.clearRect(0,0,W,H);
  drawBG();

  /* ambient particles */
  var showAmb=phaseNow!=='done';
  if(showAmb){
    var asc=phaseNow==='cup'||phaseNow==='activated'?.28:1;
    PARTS.forEach(function(p){
      p.flicker+=.018;
      var fa=p.a*(1+Math.sin(p.flicker)*.3)*asc;
      p.x+=p.vx*(phaseNow==='cup'?.25:1);
      p.y+=p.vy*(phaseNow==='cup'?.25:1);
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      var halo=cx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*4.2);
      halo.addColorStop(0,rgb(p.c,fa*.75)); halo.addColorStop(1,rgb(p.c,0));
      cx.fillStyle=halo; cx.beginPath(); cx.arc(p.x,p.y,p.r*4.2,0,Math.PI*2); cx.fill();
      cx.beginPath(); cx.arc(p.x,p.y,p.r,0,Math.PI*2); cx.fillStyle=rgb(p.c,fa); cx.fill();
    });
  }

  /* logo trace */
  if(phaseNow==='logo'){
    traceT=Math.min(1,traceT+.012);
    var vis=Math.floor(traceT*TRACE.length);
    for(var vi=0;vi<vis;vi++){
      var pt=TRACE[vi];
      var age=(vis-vi)/Math.max(vis,1);
      var glow=Math.max(0,1-(vis-vi)/26);
      if(glow>.04){
        var hl=cx.createRadialGradient(pt.x,pt.y,0,pt.x,pt.y,pt.r*7);
        hl.addColorStop(0,rgb(T,glow*.22)); hl.addColorStop(1,rgb(T,0));
        cx.fillStyle=hl; cx.beginPath(); cx.arc(pt.x,pt.y,pt.r*7,0,Math.PI*2); cx.fill();
      }
      cx.beginPath(); cx.arc(pt.x,pt.y,pt.r*(1+glow*1.8),0,Math.PI*2);
      cx.fillStyle=rgb(pt.c,.12+age*.78); cx.fill();
    }
  }

  /* cup */
  if(phaseNow==='cup'||phaseNow==='activated'||phaseNow==='done'){
    floatT+=.016;
    var fOff=phaseNow==='cup'?Math.sin(floatT)*6.5:Math.sin(floatT)*2.5;
    CUP.py+=(CUP.pt-CUP.py)*.10;
    CUP.ga+=(CUP.gt-CUP.ga)*.07;
    var savedY=CUP.y; CUP.y+=fOff;
    drawCup();
    CUP.y=savedY;
  }

  /* ripples + toxins */
  if(phaseNow==='activated'||phaseNow==='done'){
    for(var ri=RIPS.length-1;ri>=0;ri--){
      var rp=RIPS[ri]; rp.t+=.018;
      if(rp.t>1){RIPS.splice(ri,1);continue;}
      var rs=rp.t,ra=.52*(1-rp.t);
      cx.beginPath(); cx.ellipse(rp.cx,rp.cy,rp.rx*rs,rp.ry*rs,0,0,Math.PI*2);
      cx.strokeStyle=rgb(T,ra); cx.lineWidth=1.6; cx.stroke();
      cx.beginPath(); cx.ellipse(rp.cx,rp.cy,rp.rx*rs*.5,rp.ry*rs*.5,0,0,Math.PI*2);
      cx.strokeStyle=rgb(T,ra*.35); cx.lineWidth=.8; cx.stroke();
    }
    for(var pi=0;pi<TOXIN.length;pi++){
      var tp=TOXIN[pi];
      if(tp.del>0){tp.del--;continue;}
      tp.x+=tp.vx; tp.y+=tp.vy; tp.vx*=.993;
      tp.life+=.016;
      if(tp.life<.22)tp.a=tp.life/.22*tp.ma;
      else if(tp.life>.60)tp.a=tp.ma*(1-(tp.life-.60)/.40);
      if(tp.life>1){tp.a=0;continue;}
      if(!tp.clean&&tp.y<CUP.y-CUP.h*.32){tp.clean=true;tp.c=T;tp.r*=.7;}
      if(tp.clean){
        var cor=cx.createRadialGradient(tp.x,tp.y,0,tp.x,tp.y,tp.r*5);
        cor.addColorStop(0,rgb(T,tp.a*.28)); cor.addColorStop(1,rgb(T,0));
        cx.fillStyle=cor; cx.beginPath(); cx.arc(tp.x,tp.y,tp.r*5,0,Math.PI*2); cx.fill();
      }
      cx.beginPath(); cx.arc(tp.x,tp.y,tp.r,0,Math.PI*2); cx.fillStyle=rgb(tp.c,tp.a); cx.fill();
    }
  }
}
render();
mkAmb();

/* ─── TRANSITION HELPERS ─────────────────────────── */
function g(id){return document.getElementById(id);}
function show(id,delay){setTimeout(function(){var e=g(id);if(e){e.style.transition='opacity .65s cubic-bezier(.4,0,.2,1)';e.style.opacity='1';if(id==='s3')e.style.pointerEvents='auto';}},delay||0);}
function hide(id,delay,cb){setTimeout(function(){var e=g(id);if(e){e.style.transition='opacity .55s ease';e.style.opacity='0';e.style.pointerEvents='none';}if(cb)setTimeout(cb,580);},delay||0);}
function animProp(id,prop,val,delay){setTimeout(function(){var e=g(id);if(e)e.style[prop]=val;},delay||0);}

/* ─── STEP 1: PRELOAD ────────────────────────────── */
var pv=0, pTimer;
function startPre(){
  phaseNow='pre';
  setTimeout(function(){g('skip').classList.add('on');},800);
  pTimer=setInterval(function(){
    pv+=Math.random()*4+1.5; if(pv>100)pv=100;
    var p=Math.floor(pv);
    g('lf').style.width=p+'%'; g('lp').textContent=p+'%';
    if(pv>=100){clearInterval(pTimer);setTimeout(gotoLogo,380);}
  },50);
}

/* ─── STEP 2: LOGO ───────────────────────────────── */
function gotoLogo(){
  buildTrace(); phaseNow='logo';
  hide('s1',0,function(){
    show('s2');
    setTimeout(function(){var r=g('rRule');if(r){r.style.transition='width 1s cubic-bezier(.4,0,.2,1)';r.style.width='100px';}},250);
    setTimeout(function(){var n=g('rName');if(n){n.style.opacity='1';n.style.transform='translateY(0)';}},750);
    setTimeout(function(){var sb=g('rSub');if(sb){sb.style.opacity='1';sb.style.transform='translateY(0)';}},1100);
  });
  setTimeout(gotoCup,3400);
}

/* ─── STEP 3: CUP ────────────────────────────────── */
function gotoCup(){
  initCup(); phaseNow='cup'; placeZone();
  g('clickZone').style.pointerEvents='auto';
  hide('s2',0,function(){
    show('s3');
    setTimeout(function(){var e=g('cupSuper');if(e){e.style.opacity='1';e.style.transform='translateY(0)';}},420);
    setTimeout(function(){var e=g('cupHead');if(e){e.style.opacity='1';e.style.transform='translateY(0)';}},640);
    setTimeout(function(){var e=g('cupCta');if(e){e.style.opacity='1';e.style.transform='translateY(0)';}},960);
  });
  CUP.gt=0.42;
}

/* ─── CUP CLICK ──────────────────────────────────── */
var activated=false;
function onCupClick(){
  if(activated||phaseNow!=='cup')return;
  activated=true; phaseNow='activated';
  g('clickZone').style.pointerEvents='none';

  /* spring press */
  CUP.pt=24; CUP.gt=1.1;
  setTimeout(function(){CUP.pt=-9;},540);
  setTimeout(function(){CUP.pt=0; CUP.gt=0.55;},880);

  /* CSS ripples */
  var ox=CUP.x, oy=CUP.y+CUP.h*.1;
  [[220,900],[400,1100],[680,1400],[1050,1750],[Math.max(W,H)*2.2,2300]].forEach(function(p,i){
    setTimeout(function(){
      var e=document.createElement('div');
      e.className='rpl';
      e.style.cssText='left:'+ox+'px;top:'+oy+'px;width:'+p[0]+'px;height:'+p[0]+'px';
      e.style.setProperty('--d',p[1]+'ms');
      document.body.appendChild(e);
      setTimeout(function(){e.remove();},p[1]+100);
    },i*165);
  });

  /* 3D canvas ripples */
  for(var k=0;k<9;k++){(function(idx){setTimeout(function(){var rx=CUP.w*.66+idx*CUP.w*.08;RIPS.push({cx:ox,cy:oy+CUP.h*.08,rx:rx,ry:rx*.16,t:0});},idx*148);})(k);}

  /* toxins */
  setTimeout(function(){spawnTox(ox,oy-CUP.h*.2);},200);

  /* hide cup text */
  ['cupSuper','cupHead','cupCta'].forEach(function(id,i){
    setTimeout(function(){var e=g(id);if(e){e.style.transition='opacity .28s ease';e.style.opacity='0';}},i*75);
  });

  /* activation */
  setTimeout(function(){
    show('s4');
    setTimeout(function(){
      ['actSt','actBW','actSub'].forEach(function(id,i){
        setTimeout(function(){var e=g(id);if(e)e.style.opacity='1';},i*120);
      });
      g('actNum').style.color='rgba(255,255,255,.04)';
      runCounter();
    },340);
  },420);
}

var MSGS=['Initiating Detox Protocol','Scanning Pressure Points','Engaging Vacuum Seal','Extracting Toxin Markers','Purifying Subcutaneous Flow','Transmuting Energy','Detox Complete — Welcome'];
var mIdx=0;
function runCounter(){
  var p=0,done=false;
  var bar=g('actB'),num=g('actNum'),lbl=g('actSt');
  var iv=setInterval(function(){
    p+=Math.random()*3+1.2; if(p>100)p=100;
    var pf=Math.floor(p);
    if(bar)bar.style.width=pf+'%';
    if(num)num.textContent=pf;
    var ni=Math.min(MSGS.length-1,Math.floor(p/15));
    if(ni!==mIdx){mIdx=ni;if(lbl){lbl.style.transition='opacity .2s';lbl.style.opacity='0';setTimeout(function(){lbl.textContent=MSGS[mIdx];lbl.style.opacity='1';},240);}}
    if(p>=100&&!done){done=true;clearInterval(iv);setTimeout(finish,720);}
  },46);
}

function finish(){
  phaseNow='done'; sessionStorage.setItem(SEEN,1);
  ['s3','s4'].forEach(function(id){hide(id,0);});
  g('skip').style.opacity='0';
  setTimeout(function(){
    cancelAnimationFrame(RAF); cx.clearRect(0,0,W,H);
    cv.style.display='none';
    document.getElementById('ui').style.display='none';
    document.getElementById('scan').style.display='none';
    g('skip').style.display='none';
    g('clickZone').style.display='none';
    document.body.style.overflow='auto';
    window.dispatchEvent(new CustomEvent('detoxy:introComplete'));
    try{ window.parent.postMessage('introComplete','*'); }catch(e){}
  },750);
}

function skipAll(){
  clearInterval(pTimer); sessionStorage.setItem(SEEN,1);
  cancelAnimationFrame(RAF); cx.clearRect(0,0,W,H);
  cv.style.display='none';
  document.getElementById('ui').style.display='none';
  document.getElementById('scan').style.display='none';
  g('skip').style.display='none';
  g('clickZone').style.display='none';
  document.body.style.overflow='auto';
  window.dispatchEvent(new CustomEvent('detoxy:introComplete'));
  try{ window.parent.postMessage('introComplete','*'); }catch(e){}
}

if(sessionStorage.getItem(SEEN)){skipAll();}
else{startPre();}
</script>
