<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob: https:; connect-src 'self' https://script.google.com https://script.googleusercontent.com; frame-src 'self' https://www.google.com https://maps.google.com; object-src 'none'; base-uri 'self'; form-action 'self' https://wa.me;"/>
    <meta http-equiv="X-Content-Type-Options" content="nosniff"/>
  <meta name="referrer" content="strict-origin-when-cross-origin"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart | Detoxy Hijama</title>
  <meta name="theme-color" content="#1a3938"/>
  <meta name="msapplication-TileColor" content="#1a3938"/>
  <meta name="robots" content="noindex,nofollow"/>
  <meta name="description" content="Your shopping cart at Detoxy Hijama. Review your hijama cups and equipment before checkout."/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="manifest" href="/manifest.json"/>
  <link rel="stylesheet" href="/assets/style.css"/>
  <style>
    .cart-page{display:grid;grid-template-columns:1fr 360px;gap:32px;padding:40px 0 80px;align-items:start}
    .cart-items{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
    .cart-items-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
    .cart-items-head h2{font-size:1.1rem;font-weight:700;color:var(--dark)}
    .cart-item{display:grid;grid-template-columns:80px 1fr auto;gap:16px;padding:20px 24px;border-bottom:1px solid var(--border);align-items:start}
    .cart-item:last-child{border-bottom:none}
    .cart-item-img{width:80px;height:80px;border-radius:10px;object-fit:cover;border:1px solid var(--border)}
    .cart-item-name{font-weight:700;font-size:.9rem;color:var(--dark);margin-bottom:4px;line-height:1.4}
    .cart-item-cat{font-size:.75rem;color:var(--muted);margin-bottom:10px}
    .cart-item-price{font-size:.95rem;font-weight:700;color:var(--dark);font-family:'Cormorant Garamond',serif}
    .cart-item-remove{font-size:.75rem;color:var(--error);background:none;border:none;cursor:pointer;margin-top:8px;padding:0;display:flex;align-items:center;gap:4px}
    .cart-item-remove svg{width:13px;height:13px}
    .cart-item-right{display:flex;flex-direction:column;align-items:flex-end;gap:8px}
    .cart-item-subtotal{font-size:.95rem;font-weight:700;color:var(--dark)}

    .cart-summary{background:var(--white);border:1px solid var(--border);border-radius:var(--radius);padding:24px;position:sticky;top:calc(var(--nav-h) + 20px)}
    .summary-title{font-size:1rem;font-weight:700;color:var(--dark);margin-bottom:20px;padding-bottom:14px;border-bottom:1px solid var(--border)}
    .summary-row{display:flex;justify-content:space-between;align-items:center;font-size:.88rem;color:var(--muted);margin-bottom:12px}
    .summary-row strong{color:var(--dark)}
    .summary-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
    .summary-total{display:flex;justify-content:space-between;align-items:center;font-weight:700;color:var(--dark);font-size:1.05rem}
    .coupon-row{display:flex;gap:8px;margin-bottom:16px}
    .coupon-row input{flex:1;padding:10px 12px;border:1.5px solid var(--border);border-radius:7px;font-size:.85rem;outline:none}
    .coupon-row input:focus{border-color:var(--t)}
    .shipping-note{background:var(--tp);border-radius:8px;padding:10px 14px;font-size:.8rem;color:var(--td);display:flex;align-items:center;gap:8px;margin-bottom:16px}
    .shipping-note svg{width:14px;height:14px;flex-shrink:0}

    @media(max-width:800px){.cart-page{grid-template-columns:1fr}.cart-summary{position:static}}
    @media(max-width:500px){.cart-item{grid-template-columns:64px 1fr;}.cart-item-right{flex-direction:row;align-items:center}.cart-item-img{width:64px;height:64px}}
  </style>
  <link rel="icon" type="image/png" href="/assets/images/favicon.png"/>
  <link rel="apple-touch-icon" href="/assets/images/logo-192.png"/>
</head>
<body>
<script src="/assets/js/monitor.js"></script>


<div id="header-mount" data-page=""></div>

<section class="page-hero">
  <div class="container">
    <nav class="breadcrumb" aria-label="Breadcrumb">
      <a href="/index.html">Home</a>
      <svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      <span aria-current="page">Shopping Cart</span>
    </nav>
    <h1>Shopping Cart</h1>
  </div>
</section>

<div class="container">
  <div class="cart-page" id="cartPage">
    <!-- Loaded by JS -->
  </div>
</div>

<section class="container" id="crossSellSection" style="padding:40px 0 80px;border-top:1px solid var(--border);margin-top:40px;display:none">
  <div id="cartCrossSell"></div>
</section>

<div id="footer-mount"></div>
<script src="/assets/js/shared.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  var hm = document.getElementById('header-mount');
  if (hm) {
    var frag = document.createRange().createContextualFragment(renderHeader(''));
    hm.replaceWith(frag);
    Cart.updateUI(); if(typeof Wishlist!=="undefined") Wishlist.updateUI();
    initSearch();
    initMobileNav(); if(typeof initScrollTop==="function") initScrollTop();
    updateNavAuthLink();
  }
  var fm = document.getElementById('footer-mount');
  if (fm) fm.outerHTML = renderFooter();
  renderCart();
  // Cart cross-sells — wait for PRODUCTS to be ready
  var _crossSellInit = function(){
    var sec = document.getElementById('crossSellSection');
    var sells = typeof DHIntel !== 'undefined' ? DHIntel.getCartCrossSells(4) : [];
    if(sells.length && sec){
      sec.style.display = 'block';
      renderCrossSellWidget('cartCrossSell', null);
      initAnimateOnScroll();
    }
  };
  document.addEventListener('productsUpdated', _crossSellInit);
  setTimeout(_crossSellInit, 500);
});

function renderCart() {
  var items = Cart.get();
  var page = document.getElementById('cartPage');
  if (!page) return;

  if (items.length === 0) {
    page.innerHTML = '<div style="grid-column:1/-1"><div class="empty-state"><div class="empty-state-icon"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg></div><h3>Your cart is empty</h3><p>Add some products to get started</p><a href="/products.html" class="btn btn-primary">Shop Now</a></div></div>';
    return;
  }

  var subtotal = Cart.total();
  var shipping = subtotal >= 999 ? 0 : 60;
  var total = subtotal + shipping;

  var itemsHtml = items.map(function(item) {
    // Support both simple {id,qty} and enriched {id,qty,price,name,image,size} items
    var p = PRODUCTS.find(function(x){ return x.id === item.id || item.id.startsWith(x.id+'-'); });
    var name    = item.name  || (p && p.name)  || item.id;
    var price   = item.price || (p && p.price) || 0;
    var imgSrc  = item.image || (p && p.images && p.images[0] ? '/'+p.images[0] : '/assets/images/placeholder.svg');
    var catLabel= p ? p.categoryLabel : '';
    var sizeTag = item.size ? '<span style="display:inline-block;padding:2px 8px;background:var(--tp);color:var(--td);border:1px solid var(--tp2);border-radius:50px;font-size:.65rem;font-weight:700;margin-bottom:8px">'+item.size+'</span><br>' : '';
    return '<div class="cart-item" id="ci-'+item.id+'">' +
      '<img loading="lazy" decoding="async" src="'+imgSrc+'" alt="'+name+'" class="cart-item-img" onerror="this.src=\'/assets/images/placeholder.svg\'">' +
      '<div>' +
        '<div class="cart-item-name">'+name+'</div>' +
        sizeTag +
        '<div class="cart-item-cat">'+catLabel+'</div>' +
        '<div class="qty-control">' +
          '<button class="qty-btn" onclick="updateQty(\''+item.id+'\','+(item.qty-1)+')">-</button>' +
          '<input type="number" class="qty-input" value="'+item.qty+'" min="1" max="20" onchange="updateQty(\''+item.id+'\',parseInt(this.value))">' +
          '<button class="qty-btn" onclick="updateQty(\''+item.id+'\','+(item.qty+1)+')">+</button>' +
        '</div>' +
        '<button class="cart-item-remove" onclick="removeItem(\''+item.id+'\')"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg> Remove</button>' +
      '</div>' +
      '<div class="cart-item-right">' +
        '<div class="cart-item-subtotal">'+fmtINR(price * item.qty)+'</div>' +
        '<div style="font-size:.76rem;color:var(--muted)">'+fmtINR(price)+' each</div>' +
      '</div>' +
    '</div>';
  }).join('');

  page.innerHTML =
    '<div class="cart-items">' +
      '<div class="cart-items-head"><h2>Cart Items ('+items.length+')</h2><button onclick="Cart.clear();renderCart();" style="font-size:.78rem;color:var(--error);background:none;border:none;cursor:pointer;font-weight:600">Clear Cart</button></div>' +
      itemsHtml +
    '</div>' +
    '<div class="cart-summary">' +
      '<div class="summary-title">Order Summary</div>' +
      '<div class="shipping-note"><svg fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>Shipping charges will be confirmed after order review.</div>' +
      '<div class="summary-row"><span>Subtotal</span><strong>'+fmtINR(subtotal)+'</strong></div>' +
      '<div class="summary-row"><span>Shipping</span><strong>To be quoted</strong></div>' +
      '<hr class="summary-divider">' +
      '<div class="summary-total"><span>Total</span><span>'+fmtINR(total)+'</span></div>' +
      '<div style="margin-top:20px;display:flex;flex-direction:column;gap:10px">' +
        '<a href="/checkout.html" class="btn btn-primary btn-block btn-lg">Proceed to Checkout</a>' +
        '<a href="/products.html" class="btn btn-outline btn-block">Continue Shopping</a>' +
      '</div>' +
      '<p style="font-size:.73rem;color:var(--muted);margin-top:14px;text-align:center">Secure checkout · COD available · 7-day returns</p>' +
    '</div>';
}

function updateQty(id, qty) {
  Cart.updateQty(id, qty);
  renderCart();
}

function removeItem(id) {
  Cart.remove(id);
  renderCart();
  showToast('Item removed from cart');
}
</script>
<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',function(){
    navigator.serviceWorker.register('/sw.js',{scope:'/'})
      .then(function(reg){
        // Check for updates every 60s (catches new deployments)
        // Smart SW update: check every 5min + on visibility change
        setInterval(function(){ reg.update().catch(function(){}); }, 300000);
        document.addEventListener('visibilitychange', function(){ if(document.visibilityState==='active') reg.update().catch(function(){}); });
      }).catch(function(){});
  });
}
</script>
</body>
</html>
